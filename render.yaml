services:
  # Backend Web Service
  - type: web
    name: prithvinet-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # User must set in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # User must set in Render Dashboard
      - key: DATA_GOV_API_KEY
        sync: false # User must set in Render Dashboard

  # Frontend Static Site
  - type: web
    name: prithvinet-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: prithvinet-backend
          property: host
        suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
